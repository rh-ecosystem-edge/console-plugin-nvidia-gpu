name: Lint and test chart

on:
  pull_request:
    paths:
    - 'deployment/**/*'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v1
        with:
          version: v3.7.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.2.0

      - name: Validate metrics file
        run: |
          METRICS_FILE="deployment/console-plugin-nvidia-gpu/files/dcgm-metrics.csv"
          if [ ! -f "$METRICS_FILE" ]; then
            echo "Error: Metrics file not found at $METRICS_FILE"
            exit 1
          fi
          if [ ! -s "$METRICS_FILE" ]; then
            echo "Error: Metrics file is empty at $METRICS_FILE"
            exit 1
          fi
          LINE_COUNT=$(wc -l < "$METRICS_FILE")
          if [ "$LINE_COUNT" -lt 2 ]; then
            echo "Error: Metrics file must contain at least 2 lines (header + metrics)"
            exit 1
          fi
          echo "Metrics file validation passed: $LINE_COUNT lines"

      - name: Run chart-testing (lint)
        run: ct lint --config deployment/ct.yaml --target-branch ${{ github.base_ref }} --check-version-increment=false

      - name: Create kind cluster
        uses: helm/kind-action@v1.2.0

      - uses: azure/setup-kubectl@v2.0
        id: install
      - name: Setup OpenShift dependencies
        run: |
          kubectl apply -f deployment/hack/crds/*.yaml
          kubectl wait --for condition="established" -f deployment/hack/crds/*.yaml
          kubectl create ns console-plugin-nvidia-gpu
          openssl req -x509 \
            -newkey rsa:2048  \
            -sha256 \
            -new -nodes  \
            -days 365 \
            -keyout ca.key \
            -out ca.crt \
            -subj "/CN=example.com"
          kubectl create -n console-plugin-nvidia-gpu secret tls plugin-serving-cert --key ca.key --cert ca.crt

      - name: Run chart-testing (install)
        run: ct install --namespace console-plugin-nvidia-gpu --config deployment/ct.yaml --target-branch ${{ github.base_ref }}
